<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoffeeNotebook</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

<header>
    <h1>☕ CoffeeNotebook</h1>
    <button class="btn-primary" onclick="showForm()">+ Nueva receta</button>
</header>

<main>
    <!-- Aquí JavaScript va a insertar las recetas dinámicamente -->
    <div id="recipes-container"></div>
    <!-- Modal para mostrar detalles de la receta (opcional) -->
     <div id='modal' class='modal-hidden'>
        <div class="modal-content">
            <button class="btn-cerrar" onclick="closeModal()">✕</button>
            <h2 id="modal-name"></h2>
            <p id="modal-origin"></p>
            <p id="modal-method"></p>
            <h3>Ingredientes</h3>
            <p id="modal-ingredients"></p>
            <h3>Pasos</h3>
            <p id="modal-steps"></p>
        </div>
     </div>

     <!-- CREAR RECETAS -->
     <article id="recipe-form" class="form-container-hidden">
            <form>
                <button class="btn-cerrar" onclick="closeModal()">✕</button>
                <h3 id="form-title">Nueva receta</h3>
                <label for="name">Nombre</label>
                <input type="text" id="name" required>

                <label for="origin">Origen</label>
                <input type="text" id="origin">

                <label for="method">Método</label>
                <input type="text" id="method">

                <label for="ingredients">Ingredientes</label>
                <textarea id="ingredients" rows="3"></textarea>

                <label for="steps">Pasos</label>
                <textarea id="steps" rows="4"></textarea>

                <button id="submit">Guardar receta</button>
            </form>
        </article>
</main>

<script src="app.js"></script>
<script>
    // Cuando la página carga, pide todas las recetas al backend
    getAllRecipes();

    // Esta función consulta GET /api/recipes y dibuja las tarjetas
    function getAllRecipes() {
        fetch('https://coffeenotebook-production.up.railway.app/api/recipes')
            .then(res => res.json())  // convierte la respuesta a JSON
            .then(recipes => renderRecipes(recipes));  // dibuja las recetas
    }

    // Recibe el arreglo de recetas y crea una tarjeta por cada una
    function renderRecipes(recipes) {
        const container = document.getElementById('recipes-container');

        // Si no hay recetas, muestra un mensaje
        if (recipes.length === 0) {
            container.innerHTML = '<p class="empty">No hay recetas aún. ¡Crea la primera!</p>';
            return;
        }

        // Por cada receta crea una tarjeta HTML y la agrega al contenedor
        container.innerHTML = recipes.map(recipe => `
            <div class="recipe-card">
                <h2>${recipe.name}</h2>
                <p>🌍 ${recipe.origin || 'Origen desconocido'}</p>
                <p>☕ ${recipe.method || 'Método no especificado'}</p>
                <div class="card-actions">
                    <button class="btn-ver" onclick="openModal(${recipe.id})">Ver receta</button>
                    <button onclick="showForm(${recipe.id})" class="btn-ver">Editar</button>
                    <button onclick="deleteRecipe(${recipe.id})" class="btn-danger">Eliminar</button>
                </div>
            </div>
        `).join('');
    }

    // Elimina una receta y recarga la lista
    function deleteRecipe(id) {
        if (!confirm('¿Seguro que quieres eliminar esta receta?')) return;

        fetch(`https://coffeenotebook-production.up.railway.app/api/recipes/${id}`, {
            method: 'DELETE'
        }).then(() => getAllRecipes()); // recarga la lista después de eliminar
    }

    /* CREAR RECETA */
    function showForm(id) {
        document.getElementById('recipe-form').classList.remove('form-container-hidden');
        document.getElementById('recipe-form').classList.add('form-container-visible');

        //Función 1 — Leer los inputs del formulario
        //Su único trabajo es agarrar lo que el usuario
        function getFormData() {
            return {
                name: document.getElementById('name').value,
                origin: document.getElementById('origin').value,
                method: document.getElementById('method').value,
                ingredients: document.getElementById('ingredients').value,
                steps: document.getElementById('steps').value
            }
    }

        //Función 2 — Guardar (crear o editar)
        //Se ejecuta cuando el usuario hace clic en Submit
        document.getElementById('submit').addEventListener('click', function(event) {
            document.getElementById('recipe-form').classList.remove('form-container-hidden');
            document.getElementById('recipe-form').classList.add('form-container-visible');
            event.preventDefault(); // Evita que el formulario se envíe de la forma tradicional

            const data = getFormData(); // Agarra los datos del formulario

            if (id) {
                // Si hay un ID, es una edición
                fetch(`https://coffeenotebook-production.up.railway.app/api/recipes/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                }).then(() => window.location.href = 'index.html'); // Volver al listado
            } else {
                // Si no hay ID, es una creación
                fetch('https://coffeenotebook-production.up.railway.app/api/recipes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                }).then(() => window.location.href = 'index.html'); // Volver al listado
            }
        });

        //Función 3 — Cargar datos si es edición
        //Si el usuario está editando, cuando la página carga tenemos que pedir los datos de
        //esa receta al backend y llenar el formulario
        function loadRecipe(id) {
            fetch(`https://coffeenotebook-production.up.railway.app/api/recipes/${id}`)
                .then(res => res.json())
                .then(recipe => {
                    document.getElementById('name').value = recipe.name;
                    document.getElementById('origin').value = recipe.origin;
                    document.getElementById('method').value = recipe.method;
                    document.getElementById('ingredients').value = recipe.ingredients;
                    document.getElementById('steps').value = recipe.steps;
                });
        }

        if (id) {
            loadRecipe(id);
        }
        
    }
        


    /* MOSTRAR RECETAS */
    function openModal(id){
        fetch(`https://coffeenotebook-production.up.railway.app/api/recipes/${id}`, {
            method: 'GET'
        })
            .then(res => res.json())
            .then(recipes => {
                document.getElementById('modal-name').textContent = recipes.name;
                document.getElementById('modal-origin').textContent = recipes.origin || 'Origen desconocido';
                document.getElementById('modal-method').textContent = recipes.method || 'Método no especificado';
                document.getElementById('modal-ingredients').textContent = recipes.ingredients;
                document.getElementById('modal-steps').textContent = recipes.steps;
                
                document.getElementById('modal').classList.remove('modal-hidden');
                document.getElementById('modal').classList.add('modal-visible');
            })

    }
    
    function closeModal() {
    document.getElementById('modal').classList.remove('modal-visible');
    document.getElementById('modal').classList.add('modal-hidden');
    }


</script>
</body>
</html>
